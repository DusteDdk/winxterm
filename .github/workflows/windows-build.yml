name: Windows build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build x64 release executables
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build with Visual Studio 2022
        shell: bash
        run: bash ./build-fast-release.sh

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: winxterm-windows-x64
          path: |
            dist-fast-release/winxterm.exe
            dist-fast-release/dstshell.exe
          if-no-files-found: error
          retention-days: 14
